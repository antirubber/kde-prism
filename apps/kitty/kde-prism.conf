# KDE Prism theme for Kitty
# Place at ~/.config/kitty/themes/kde-prism.conf
# Or add to kitty.conf: include themes/kde-prism.conf

background            #000000
foreground            #BDA7F0
background_opacity    0.95

cursor                #FF7447
cursor_text_color     #000000

selection_background  #BDA7F0
selection_foreground  #000000

# Black
color0                #000000
color8                #555555

# Red
color1                #FF7447
color9                #FF8F6B

# Green
color2                #7EC9A0
color10               #A0DBB8

# Yellow
color3                #FFCC66
color11               #FFD999

# Blue
color4                #A8C4FF
color12               #C0D4FF

# Magenta
color5                #BDA7F0
color13               #CAB8F5

# Cyan
color6                #89DDFF
color14               #B0E8FF

# White
color7                #E3D9FF
color15               #F5F0FF

# OS window titlebar
wayland_titlebar_color #000000
macos_titlebar_color   #000000

# URL style
url_style             curly
url_color             #FF7447

# Tab bar
active_tab_foreground   #000000
active_tab_background   #BDA7F0
active_tab_font_style   bold
inactive_tab_foreground #BDA7F0
inactive_tab_background #191919
tab_bar_background      #000000
tab_bar_edge           bottom

# Bell
visual_bell_duration 0
enable_audio_bell    no

# Font
font_family      DM Mono
bold_font        DM Mono Medium
italic_font      DM Mono Italic
bold_italic_font DM Mono Medium Italic
font_size        11.0

# Window
window_padding_width 4
window_border_width  1pt
window_border_color  #BDA7F0